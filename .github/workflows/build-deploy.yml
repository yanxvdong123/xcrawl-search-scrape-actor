name: Build and Deploy on Apify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Apify CLI
        run: npm install -g apify-cli
      - name: Build and push to Apify
        run: apify push
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
